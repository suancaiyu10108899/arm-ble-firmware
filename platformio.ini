; PlatformIO 项目配置 — Adafruit Feather nRF52840 Express
; 项目: 假肢机械臂 — Arduino 蓝牙板固件
; ============================================================

[env:adafruit_feather_nrf52840_express]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino
monitor_speed = 115200

; ---- 依赖库 ----
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0

; ---- 编译选项 ----
build_flags =
    -D LED_BUILTIN=13

; ---- 串口监视器 ----
; 上电后板子会映射为一个 COM 口，PlatformIO 自动检测